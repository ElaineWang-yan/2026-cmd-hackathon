<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedEx — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --ink: #1a1a18;
    --ink-muted: #7a7a72;
    --ink-faint: #b8b8b0;
    --accent: #2a6b52;
    --accent-light: #e8f2ee;
    --accent-hover: #205540;
    --border: #e4e3de;
    --shadow: 0 2px 8px rgba(26,26,24,0.06), 0 12px 32px rgba(26,26,24,0.07);
    --radius: 14px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Subtle dot grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #c8c7c0 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }

  .login-card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 44px 40px;
    width: 400px;
    box-shadow: var(--shadow);
    animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: baseline;
    gap: 1px;
    margin-bottom: 36px;
  }
  .logo-med {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .logo-ex {
    font-family: 'Lora', serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .logo-dot {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 3px;
    margin-bottom: 3px;
    flex-shrink: 0;
  }

  /* Heading */
  .login-title {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 14px;
    font-weight: 300;
    color: var(--ink-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* Input group */
  .input-group {
    margin-bottom: 14px;
  }
  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 7px;
  }
  .input-group input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 400;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  .input-group input::placeholder { color: var(--ink-faint); }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(42,107,82,0.1);
  }

  /* Forgot */
  .forgot {
    text-align: right;
    margin-top: -4px;
    margin-bottom: 24px;
  }
  .forgot a {
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .forgot a:hover { opacity: 0.65; }

  /* Button */
  .btn-signin {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 9px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
    box-shadow: 0 2px 10px rgba(42,107,82,0.22);
  }
  .btn-signin:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(42,107,82,0.28);
  }
  .btn-signin:active { transform: translateY(0); }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0;
  }
  .divider span { flex: 1; height: 1px; background: var(--border); }
  .divider p { color: var(--ink-faint); font-size: 12px; font-weight: 400; }

  /* Register */
  .register-link {
    text-align: center;
    font-size: 14px;
    color: var(--ink-muted);
    font-weight: 400;
  }
  .register-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .register-link a:hover { opacity: 0.65; }

  /* Message */
  #message {
    margin-top: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--ink-muted);
    min-height: 18px;
    transition: color 0.2s;
  }
  #message.error  { color: #c0392b; }
  #message.success { color: var(--accent); }
</style>
</head>

<body>
<div class="login-card">

  <div class="logo">
    <span class="logo-med">Med</span><span class="logo-ex">Ex</span>
    <div class="logo-dot"></div>
  </div>

  <h1 class="login-title">Welcome back</h1>
  <p class="login-sub">Sign in to continue to your account.</p>

  <form id="loginForm">
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button type="submit" class="btn-signin">Sign in</button>
  </form>

  <div class="divider">
    <span></span><p>or</p><span></span>
  </div>

  <p class="register-link">
    Don't have an account? <a href="/register">Create one</a>
  </p>

  <p id="message"></p>
</div>

<script>
  document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const msg = document.getElementById("message");
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    msg.className = '';
    msg.innerText = 'Signing in…';

    try {
  const response = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await response.json();
  if (response.ok) {
    msg.className = 'success';
    msg.innerText = data.message;
    setTimeout(() => window.location.href = "/home", 1500);
  } else {
    msg.className = 'error';
    msg.innerText = data.message;
  }
} catch {
  msg.className = 'error';
  msg.innerText = 'Network error. Please try again.';
}
  });
</script>
</body>
</html>
