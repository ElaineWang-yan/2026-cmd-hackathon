<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExperience — Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --ink: #1a1a18;
            --ink-muted: #7a7a72;
            --ink-faint: #b8b8b0;
            --accent: #2a6b52;
            --accent-hover: #205540;
            --accent-light: #e8f2ee;
            --border: #e4e3de;
            --shadow-md: 0 4px 16px rgba(26,26,24,0.1), 0 12px 32px rgba(26,26,24,0.08);
        }

        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle, #c8c7c0 1px, transparent 1px);
            background-size: 28px 28px; opacity: 0.45; pointer-events: none; z-index: 0;
        }

        /* NAVBAR */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 60px;
            background: rgba(255,255,255,0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 16px;
        }
        .nav-logo { display: flex; align-items: baseline; gap: 1px; text-decoration: none; flex-shrink: 0; margin-right: 8px; }
        .logo-med { font-family: 'Lora', serif; font-weight: 600; font-size: 20px; color: var(--ink); letter-spacing: -0.01em; }
        .logo-ex  { font-family: 'Lora', serif; font-weight: 500; font-size: 20px; color: var(--accent); letter-spacing: -0.01em; }
        .logo-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin-left: 2px; margin-bottom: 2px; flex-shrink: 0; }
        .nav-search { flex: 1; max-width: 440px; position: relative; }
        .nav-search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); pointer-events: none; }
        .nav-search input {
            width: 100%; padding: 8px 14px 8px 36px; background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--ink);
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }
        .nav-search input::placeholder { color: var(--ink-faint); }
        .nav-search input:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(42,107,82,0.1); }
        .nav-spacer { flex: 1; }
        .btn-new-post {
            display: flex; align-items: center; gap: 6px; padding: 7px 14px;
            background: var(--accent); border: none; border-radius: 8px; color: #fff;
            font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; flex-shrink: 0; text-decoration: none;
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
            box-shadow: 0 2px 8px rgba(42,107,82,0.2);
        }
        .btn-new-post:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(42,107,82,0.28); }
        .nav-profile { position: relative; flex-shrink: 0; }
        .profile-avatar {
            width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #fff; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600;
            transition: box-shadow 0.18s, transform 0.12s;
        }
        .profile-avatar:hover { box-shadow: 0 0 0 3px rgba(42,107,82,0.18); transform: scale(1.05); }
        .dropdown {
            display: none; position: absolute; top: calc(100% + 10px); right: 0;
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            box-shadow: var(--shadow-md); min-width: 180px; overflow: hidden;
            animation: dropIn 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .dropdown.open { display: block; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .dropdown-email { padding: 12px 16px 10px; font-size: 12px; color: var(--ink-faint); border-bottom: 1px solid var(--border); }
        .dropdown-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 16px;
            font-size: 14px; font-family: 'Nunito', sans-serif; color: var(--ink);
            background: none; border: none; width: 100%; text-align: left;
            cursor: pointer; transition: background 0.12s; text-decoration: none;
        }
        .dropdown-item:hover { background: var(--bg); }
        .dropdown-item.danger { color: #c0392b; }
        .dropdown-item.danger:hover { background: #fdf2f2; }
        .dropdown-divider { height: 1px; background: var(--border); }

        /* PAGE */
        .page-wrap { position: relative; z-index: 1; max-width: 720px; margin: 88px auto 60px; padding: 0 24px; }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600; color: var(--ink-muted);
            text-decoration: none; margin-bottom: 24px; transition: color 0.15s;
        }
        .back-link:hover { color: var(--accent); }

        /* POST DETAIL */
        .post-detail {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 28px 32px; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(26,26,24,0.05);
        }

        /* POST FIELDS */
        .post-fields { display: flex; flex-direction: column; gap: 0; }
        .post-field-row {
            display: flex; align-items: baseline; gap: 8px;
            padding: 9px 0; border-bottom: 1px solid var(--border);
            font-size: 14px; line-height: 1.6;
        }
        .post-field-row:last-child { border-bottom: none; }
        .post-field-label { font-weight: 600; color: var(--ink); white-space: nowrap; flex-shrink: 0; min-width: 200px; }
        .post-field-value { font-weight: 300; color: var(--ink-muted); }

        /* Description block — full width, visually separated */
        .post-description-block {
            margin-top: 4px;
            padding: 14px 16px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .post-description-label {
            font-size: 11px; font-weight: 700; color: var(--ink-faint);
            text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px;
        }
        .post-description-text {
            font-size: 14px; font-weight: 300; color: var(--ink-muted);
            line-height: 1.75; white-space: pre-wrap;
        }

        .badge { display: inline-block; padding: 3px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
        .badge-yes { background: #dcfce7; color: #166534; }
        .badge-no  { background: #fee2e2; color: #991b1b; }
        .btn-delete-post {
            background: none; border: 1.5px solid #fca5a5; color: #c0392b;
            border-radius: 8px; padding: 6px 14px;
            font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: background 0.15s; flex-shrink: 0;
        }
        .btn-delete-post:hover { background: #fdf2f2; }

        /* SURVEY */
        .survey-card {
            background: var(--accent-light); border: 1px solid #c5dfd6;
            border-radius: 14px; padding: 22px 24px; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(26,26,24,0.05);
        }
        .survey-question { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 16px; }
        .survey-buttons  { display: flex; gap: 10px; margin-bottom: 16px; }
        .btn-vote {
            padding: 9px 24px; border-radius: 8px; font-family: 'Nunito', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
            border: 1.5px solid var(--border); background: var(--surface); color: var(--ink-muted);
        }
        .btn-vote:hover { border-color: var(--accent); color: var(--accent); background: #fff; }
        .btn-vote.active-yes { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(42,107,82,0.2); }
        .btn-vote.active-no  { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .survey-results { margin-top: 4px; }
        .survey-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .survey-row-label { font-size: 12px; font-weight: 600; color: var(--ink-muted); width: 28px; flex-shrink: 0; }
        .survey-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .survey-bar { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
        .survey-bar.yes { background: var(--accent); }
        .survey-bar.no  { background: #fca5a5; }
        .survey-row-count { font-size: 12px; color: var(--ink-faint); width: 60px; text-align: right; flex-shrink: 0; }
        .survey-total { font-size: 12px; color: var(--ink-faint); margin-top: 6px; }

        /* COMMENTS */
        .section-title { font-family: 'Lora', serif; font-size: 18px; font-weight: 500; color: var(--ink); margin-bottom: 14px; letter-spacing: -0.01em; }
        .comment-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 20px 24px; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(26,26,24,0.05);
        }
        .comment-input {
            width: 100%; min-height: 80px; resize: vertical;
            border: 1.5px solid var(--border); border-radius: 8px;
            padding: 10px 14px; font-family: 'Nunito', sans-serif;
            font-size: 14px; font-weight: 300; color: var(--ink);
            background: var(--bg); margin-bottom: 12px;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        .comment-input::placeholder { color: var(--ink-faint); }
        .comment-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,107,82,0.1); background: #fff; }
        .btn-submit {
            padding: 8px 18px; background: var(--accent); color: #fff;
            border: none; border-radius: 8px; font-family: 'Nunito', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.18s, transform 0.12s;
            box-shadow: 0 2px 8px rgba(42,107,82,0.2);
        }
        .btn-submit:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-cancel {
            padding: 8px 14px; background: none; color: var(--ink-muted);
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; margin-left: 8px; transition: border-color 0.15s, color 0.15s;
        }
        .btn-cancel:hover { border-color: var(--ink-muted); color: var(--ink); }

        .comment-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(26,26,24,0.04);
            animation: fadeUp 0.2s ease both; overflow: hidden;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .comment-main {
            padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
        }
        .comment-body { flex: 1; min-width: 0; }
        .comment-author { font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
        .comment-content { font-size: 14px; font-weight: 300; color: var(--ink-muted); line-height: 1.7; }
        .comment-meta { font-size: 11px; color: var(--ink-faint); margin-top: 5px; }
        .comment-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .btn-reply {
            background: none; border: none; color: var(--ink-faint);
            cursor: pointer; font-size: 12px; font-weight: 600;
            font-family: 'Nunito', sans-serif; padding: 3px 8px; border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }
        .btn-reply:hover { color: var(--accent); background: var(--accent-light); }
        .btn-delete {
            background: none; border: none; color: var(--ink-faint);
            cursor: pointer; font-size: 13px; padding: 3px 7px;
            border-radius: 6px; flex-shrink: 0; line-height: 1;
            transition: color 0.15s, background 0.15s;
        }
        .btn-delete:hover { color: #c0392b; background: #fdf2f2; }
        .replies-toggle {
            display: flex; align-items: center; gap: 6px; padding: 8px 20px 10px;
            background: none; border: none; border-top: 1px solid var(--border);
            width: 100%; text-align: left; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600;
            color: var(--accent); transition: background 0.12s;
        }
        .replies-toggle:hover { background: var(--accent-light); }
        .toggle-arrow { font-size: 10px; transition: transform 0.2s; display: inline-block; }
        .toggle-arrow.open { transform: rotate(90deg); }
        .replies-section { display: none; border-top: 1px solid var(--border); background: #faf9f6; }
        .replies-section.open { display: block; }
        .reply-card {
            padding: 13px 20px 13px 36px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
            position: relative;
        }
        .reply-card:last-child { border-bottom: none; }
        .reply-card::before {
            content: ''; position: absolute; left: 20px; top: 18px;
            width: 10px; height: 1px; background: var(--border);
        }
        .reply-body { flex: 1; min-width: 0; }
        .reply-content { font-size: 13.5px; font-weight: 300; color: var(--ink-muted); line-height: 1.65; }
        .reply-mention { color: var(--accent); font-weight: 600; }
        .reply-meta { font-size: 11px; color: var(--ink-faint); margin-top: 4px; }
        .reply-compose {
            display: none; padding: 12px 20px 14px 36px;
            border-top: 1px solid var(--border); background: #faf9f6;
        }
        .reply-compose.open { display: block; }
        .reply-to-label { font-size: 11px; color: var(--ink-faint); margin-bottom: 7px; }
        .reply-to-label span { color: var(--accent); font-weight: 600; }
        .reply-input {
            width: 100%; min-height: 60px; resize: vertical;
            border: 1.5px solid var(--border); border-radius: 8px;
            padding: 8px 12px; font-family: 'Nunito', sans-serif;
            font-size: 13px; font-weight: 300; color: var(--ink);
            background: var(--surface); margin-bottom: 10px;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        .reply-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,107,82,0.1); }
        .reply-actions { display: flex; align-items: center; gap: 8px; }
        .no-comments { text-align: center; color: var(--ink-faint); font-size: 14px; padding: 32px 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/home" class="nav-logo">
            <span class="logo-med">Med</span><span class="logo-ex">Ex</span>
            <div class="logo-dot"></div>
        </a>
        <div class="nav-search">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" placeholder="Search experiences…" id="searchInput">
        </div>
        <div class="nav-spacer"></div>
        <a href="/create-post" class="btn-new-post">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New post
        </a>
        <div class="nav-profile" id="profileMenu">
            <button class="profile-avatar" id="profileBtn">U</button>
            <div class="dropdown" id="dropdown">
                <div class="dropdown-email" id="navEmail">—</div>
                <a href="/profile" class="dropdown-item">My profile</a>
                <div class="dropdown-divider"></div>
                <a href="/" class="dropdown-item danger">Log out</a>
            </div>
        </div>
    </nav>

    <div class="page-wrap">
        <a class="back-link" href="javascript:history.back()">← Back</a>
        <div class="post-detail" id="postDetail">
            <div style="color:var(--ink-faint);font-size:14px">Loading...</div>
        </div>

        <div class="survey-card">
            <div class="survey-question">Did you experience similar side effects?</div>
            <div class="survey-buttons">
                <button class="btn-vote" id="btnYes" onclick="vote('yes')">Yes, me too</button>
                <button class="btn-vote" id="btnNo"  onclick="vote('no')">Not really</button>
            </div>
            <div class="survey-results" id="surveyResults" style="display:none">
                <div class="survey-row">
                    <div class="survey-row-label">Yes</div>
                    <div class="survey-bar-wrap"><div class="survey-bar yes" id="barYes" style="width:0%"></div></div>
                    <div class="survey-row-count" id="countYes">0</div>
                </div>
                <div class="survey-row">
                    <div class="survey-row-label">No</div>
                    <div class="survey-bar-wrap"><div class="survey-bar no" id="barNo" style="width:0%"></div></div>
                    <div class="survey-row-count" id="countNo">0</div>
                </div>
                <div class="survey-total" id="surveyTotal"></div>
            </div>
        </div>

        <div class="section-title">Comments</div>
        <div class="comment-box">
            <textarea class="comment-input" id="commentInput" placeholder="Share your thoughts or a related experience…"></textarea>
            <button class="btn-submit" id="submitBtn" onclick="submitComment()">Post comment</button>
        </div>
        <div id="commentList"></div>
    </div>

    <script>
        const profileBtn  = document.getElementById("profileBtn");
        const dropdown    = document.getElementById("dropdown");
        const profileMenu = document.getElementById("profileMenu");
        profileBtn.addEventListener("click", () => dropdown.classList.toggle("open"));
        document.addEventListener("mousedown", (e) => {
            if (!profileMenu.contains(e.target)) dropdown.classList.remove("open");
        });
        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && this.value.trim())
                window.location.href = '/feed?medicine=' + encodeURIComponent(this.value.trim());
        });

        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');
        let CURRENT_USER_ID    = null;
        let CURRENT_USER_EMAIL = null;
        let currentVote        = null;

        async function loadMe() {
            const res  = await fetch('/api/me', { credentials: 'include' });
            const data = await res.json();
            CURRENT_USER_ID    = data.user_id;
            CURRENT_USER_EMAIL = data.email;
            if (data.email) {
                document.getElementById('navEmail').textContent   = data.email;
                document.getElementById('profileBtn').textContent = data.email[0].toUpperCase();
            }
        }

        async function loadPost() {
            const res  = await fetch(`/api/posts/${postId}`, { credentials: 'include' });
            const post = await res.json();
            const hasUnlisted = post.unlisted_side_effects === 'yes';
            const isOwner = CURRENT_USER_ID && post.user_id === CURRENT_USER_ID;

            const fields = buildFields(post);

            document.getElementById('postDetail').innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
                    <div>
                        <div style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">
                            Unlisted side effects on medication label or patient information leaflet
                        </div>
                        <span class="badge ${hasUnlisted ? 'badge-yes' : 'badge-no'}">${hasUnlisted ? 'Yes' : 'No'}</span>
                    </div>
                    ${isOwner ? `<button class="btn-delete-post" onclick="deletePost()">Delete post</button>` : ''}
                </div>
                <div class="post-fields">${fields.rows}</div>
                ${fields.description ? `
                    <div class="post-description-block" style="margin-top:16px">
                        <div class="post-description-label">Experience description</div>
                        <div class="post-description-text">${escapeHtml(fields.description)}</div>
                    </div>` : ''}
            `;
        }

        function buildFields(post) {
            const rows = [];
            rows.push(row('Biological sex', formatValue(post.gender)));
            rows.push(row('Dosage', `${post.dosage_amount ?? '—'} ${post.dosage_unit ?? ''}, ${post.freq_count ?? '—'} time(s) per ${post.freq_per ?? '—'}`));
            rows.push(row('Duration', `${post.duration_value ?? '—'} ${post.duration_unit ?? ''}`));
            rows.push(row('Achieved intended effect', formatValue(post.expected_effect)));
            if (post.gender === 'female') {
                if (post.having_period) rows.push(row('Menstrual period during medication', 'Yes'));
                if (post.was_pregnant)  rows.push(row('Pregnant during medication', 'Yes'));
            }
            if (post.long_term_meds)    rows.push(row('Long-term medications', post.long_term_meds));
            if (post.health_conditions) rows.push(row('Health conditions', post.health_conditions));
            if (post.additional_notes)  rows.push(row('Additional notes', post.additional_notes));
            return { rows: rows.join(''), description: post.description || null };
        }

        function row(label, value) {
            return `<div class="post-field-row">
                <span class="post-field-label">${label}</span>
                <span class="post-field-value">${escapeHtml(String(value ?? '—'))}</span>
            </div>`;
        }

        async function deletePost() {
            if (!confirm('Delete this post? This cannot be undone.')) return;
            const res = await fetch(`/api/posts/${postId}`, { method: 'DELETE', credentials: 'include' });
            if (res.ok) window.location.href = '/profile';
        }

        async function loadSurvey() {
            const res  = await fetch(`/api/posts/${postId}/survey`, { credentials: 'include' });
            const data = await res.json();
            updateSurveyUI(data);
        }

        function updateSurveyUI(data) {
            currentVote = data.user_vote || null;
            const total = data.total || 0;
            document.getElementById('btnYes').className = 'btn-vote' + (currentVote === 'yes' ? ' active-yes' : '');
            document.getElementById('btnNo').className  = 'btn-vote' + (currentVote === 'no'  ? ' active-no'  : '');
            const resultsEl = document.getElementById('surveyResults');
            if (total > 0) {
                resultsEl.style.display = 'block';
                const yesPct = Math.round((data.yes_count / total) * 100);
                const noPct  = Math.round((data.no_count  / total) * 100);
                document.getElementById('barYes').style.width   = yesPct + '%';
                document.getElementById('barNo').style.width    = noPct  + '%';
                document.getElementById('countYes').textContent = `${data.yes_count} (${yesPct}%)`;
                document.getElementById('countNo').textContent  = `${data.no_count} (${noPct}%)`;
                document.getElementById('surveyTotal').textContent =
                    `${data.yes_count} out of ${total} ${total === 1 ? 'person' : 'people'} had a similar experience`;
            } else {
                resultsEl.style.display = 'none';
            }
        }

        async function vote(answer) {
            const payload = currentVote === answer ? null : answer;
            const res = await fetch(`/api/posts/${postId}/survey`, {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answer: payload })
            });
            if (res.status === 401) { alert('Please log in to vote.'); return; }
            updateSurveyUI(await res.json());
        }

        async function loadComments() {
            const res      = await fetch(`/api/posts/${postId}/comments`, { credentials: 'include' });
            const comments = await res.json();
            const list     = document.getElementById('commentList');
            list.innerHTML = '';
            if (comments.length === 0) {
                list.innerHTML = '<div class="no-comments">No comments yet — be the first to share.</div>';
                return;
            }
            comments.forEach(c => list.appendChild(buildCommentCard(c)));
        }

        function buildCommentCard(c) {
            const wrapper = document.createElement('div');
            wrapper.className = 'comment-card';
            wrapper.id = `comment-${c.id}`;

            const isOwn      = CURRENT_USER_ID && c.user_id === CURRENT_USER_ID;
            const date       = formatDate(c.created_at);
            const replies    = c.replies || [];
            const hasReplies = replies.length > 0;

            const main = document.createElement('div');
            main.className = 'comment-main';
            main.innerHTML = `
                <div class="comment-body">
                    <div class="comment-author">${escapeHtml(c.author_email)}</div>
                    <div class="comment-content">${escapeHtml(c.content)}</div>
                    <div class="comment-meta">${date}</div>
                </div>
                <div class="comment-actions">
                    <button class="btn-reply" onclick="openReplyBox(${c.id}, '${escapeAttr(c.author_email)}')">Reply</button>
                    ${isOwn ? `<button class="btn-delete" onclick="deleteComment(${c.id})" title="Delete">✕</button>` : ''}
                </div>
            `;
            wrapper.appendChild(main);

            const repliesSection = document.createElement('div');
            repliesSection.className = 'replies-section';
            repliesSection.id = `replies-${c.id}`;

            replies.forEach(r => {
                const replyEl = document.createElement('div');
                replyEl.className = 'reply-card';
                replyEl.id = `comment-${r.id}`;
                const isOwnReply = CURRENT_USER_ID && r.user_id === CURRENT_USER_ID;
                const mention    = r.reply_to_email ? `<span class="reply-mention">@${r.reply_to_email}</span> ` : '';
                replyEl.innerHTML = `
                    <div class="reply-body">
                        <div class="comment-author">${escapeHtml(r.author_email)}</div>
                        <div class="reply-content">${mention}${escapeHtml(r.content)}</div>
                        <div class="reply-meta">${formatDate(r.created_at)}</div>
                    </div>
                    <div class="comment-actions">
                        <button class="btn-reply" onclick="openReplyBox(${c.id}, '${escapeAttr(r.author_email)}')">Reply</button>
                        ${isOwnReply ? `<button class="btn-delete" onclick="deleteComment(${r.id})" title="Delete">✕</button>` : ''}
                    </div>
                `;
                repliesSection.appendChild(replyEl);
            });

            const compose = document.createElement('div');
            compose.className = 'reply-compose';
            compose.id = `compose-${c.id}`;
            compose.innerHTML = `
                <div class="reply-to-label" id="reply-to-label-${c.id}">Replying to <span></span></div>
                <textarea class="reply-input" id="reply-input-${c.id}" placeholder="Write a reply…"></textarea>
                <div class="reply-actions">
                    <button class="btn-submit" onclick="submitReply(${c.id})">Post reply</button>
                    <button class="btn-cancel" onclick="closeReplyBox(${c.id})">Cancel</button>
                </div>
            `;
            repliesSection.appendChild(compose);
            wrapper.appendChild(repliesSection);

            if (hasReplies) {
                const toggle = document.createElement('button');
                toggle.className = 'replies-toggle';
                toggle.id = `toggle-${c.id}`;
                toggle.innerHTML = `<span class="toggle-arrow" id="arrow-${c.id}">›</span> ${replies.length} ${replies.length === 1 ? 'reply' : 'replies'}`;
                toggle.onclick = () => toggleReplies(c.id);
                wrapper.insertBefore(toggle, repliesSection);
            }
            return wrapper;
        }

        function toggleReplies(commentId) {
            const section = document.getElementById(`replies-${commentId}`);
            const arrow   = document.getElementById(`arrow-${commentId}`);
            const isOpen  = section.classList.contains('open');
            section.classList.toggle('open', !isOpen);
            if (arrow) arrow.classList.toggle('open', !isOpen);
        }

        function openReplyBox(commentId, replyToEmail) {
            document.querySelectorAll('.reply-compose.open').forEach(el => el.classList.remove('open'));
            const compose = document.getElementById(`compose-${commentId}`);
            const label   = document.getElementById(`reply-to-label-${commentId}`);
            const input   = document.getElementById(`reply-input-${commentId}`);
            label.querySelector('span').textContent = replyToEmail;
            compose.dataset.replyToEmail = replyToEmail;
            const section = document.getElementById(`replies-${commentId}`);
            section.classList.add('open');
            const arrow = document.getElementById(`arrow-${commentId}`);
            if (arrow) arrow.classList.add('open');
            ensureToggle(commentId);
            compose.classList.add('open');
            input.focus();
        }

        function closeReplyBox(commentId) {
            document.getElementById(`compose-${commentId}`).classList.remove('open');
            document.getElementById(`reply-input-${commentId}`).value = '';
        }

        function ensureToggle(commentId) {
            if (!document.getElementById(`toggle-${commentId}`)) {
                const card    = document.getElementById(`comment-${commentId}`);
                const section = document.getElementById(`replies-${commentId}`);
                const toggle  = document.createElement('button');
                toggle.className = 'replies-toggle';
                toggle.id = `toggle-${commentId}`;
                toggle.innerHTML = `<span class="toggle-arrow open" id="arrow-${commentId}">›</span> 0 replies`;
                toggle.onclick = () => toggleReplies(commentId);
                card.insertBefore(toggle, section);
            }
        }

        async function submitComment() {
            const input   = document.getElementById('commentInput');
            const btn     = document.getElementById('submitBtn');
            const content = input.value.trim();
            if (!content) return;
            btn.disabled = true; btn.textContent = 'Posting…';
            const res = await fetch(`/api/posts/${postId}/comments`, {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            btn.disabled = false; btn.textContent = 'Post comment';
            if (res.status === 401) { alert('Please log in to post a comment.'); return; }
            input.value = '';
            loadComments();
        }

        async function submitReply(parentCommentId) {
            const compose      = document.getElementById(`compose-${parentCommentId}`);
            const input        = document.getElementById(`reply-input-${parentCommentId}`);
            const replyToEmail = compose.dataset.replyToEmail || null;
            const content      = input.value.trim();
            if (!content) return;
            const submitBtn = compose.querySelector('.btn-submit');
            submitBtn.disabled = true; submitBtn.textContent = 'Posting…';
            const res = await fetch(`/api/posts/${postId}/comments`, {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, parent_id: parentCommentId, reply_to_email: replyToEmail })
            });
            submitBtn.disabled = false; submitBtn.textContent = 'Post reply';
            if (res.status === 401) { alert('Please log in to reply.'); return; }
            input.value = '';
            closeReplyBox(parentCommentId);
            const openIds = [...document.querySelectorAll('.replies-section.open')].map(el => el.id.replace('replies-', ''));
            await loadComments();
            const toOpen = new Set([...openIds, String(parentCommentId)]);
            toOpen.forEach(id => {
                const section = document.getElementById(`replies-${id}`);
                const arrow   = document.getElementById(`arrow-${id}`);
                if (section) section.classList.add('open');
                if (arrow)   arrow.classList.add('open');
            });
        }

        async function deleteComment(commentId) {
            await fetch(`/api/comments/${commentId}`, { method: 'DELETE', credentials: 'include' });
            const openIds = [...document.querySelectorAll('.replies-section.open')].map(el => el.id.replace('replies-', ''));
            await loadComments();
            openIds.forEach(id => {
                const section = document.getElementById(`replies-${id}`);
                const arrow   = document.getElementById(`arrow-${id}`);
                if (section) section.classList.add('open');
                if (arrow)   arrow.classList.add('open');
            });
        }

        function formatValue(val) {
            if (!val) return '—';
            return val.charAt(0).toUpperCase() + val.slice(1).replace(/_/g, ' ');
        }

        function formatDate(ts) {
            return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escapeAttr(str) {
            return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        async function init() {
            await loadMe();
            loadPost();
            loadSurvey();
            loadComments();
        }
        init();
    </script>
</body>
</html>
