<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExperience</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --ink: #1a1a18;
            --ink-muted: #7a7a72;
            --ink-faint: #b8b8b0;
            --accent: #2a6b52;
            --accent-hover: #205540;
            --accent-light: #e8f2ee;
            --border: #e4e3de;
            --shadow-md: 0 4px 16px rgba(26,26,24,0.1), 0 12px 32px rgba(26,26,24,0.08);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, #c8c7c0 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.45;
            pointer-events: none;
            z-index: 0;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 60px;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 16px;
        }

        .nav-logo {
            display: flex;
            align-items: baseline;
            gap: 1px;
            text-decoration: none;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .logo-med { font-family: 'Lora', serif; font-weight: 600; font-size: 20px; color: var(--ink); letter-spacing: -0.01em; }
        .logo-ex  { font-family: 'Lora', serif; font-weight: 500; font-size: 20px; color: var(--accent); letter-spacing: -0.01em; }
        .logo-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin-left: 2px; margin-bottom: 2px; flex-shrink: 0; }

        .nav-search {
            flex: 1;
            max-width: 440px;
            position: relative;
        }
        .nav-search svg {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--ink-faint);
            pointer-events: none;
        }
        .nav-search input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: var(--ink);
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }
        .nav-search input::placeholder { color: var(--ink-faint); }
        .nav-search input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(42,107,82,0.1);
        }

        .nav-spacer { flex: 1; }

        .btn-new-post {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
            box-shadow: 0 2px 8px rgba(42,107,82,0.2);
            text-decoration: none;
        }
        .btn-new-post:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(42,107,82,0.28);
        }

        .nav-profile { position: relative; flex-shrink: 0; }
        .profile-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: box-shadow 0.18s, transform 0.12s;
        }
        .profile-avatar:hover {
            box-shadow: 0 0 0 3px rgba(42,107,82,0.18);
            transform: scale(1.05);
        }

        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow-md);
            min-width: 180px;
            overflow: hidden;
            animation: dropIn 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .dropdown.open { display: block; }
        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-6px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .dropdown-email {
            padding: 12px 16px 10px;
            font-size: 12px;
            color: var(--ink-faint);
            border-bottom: 1px solid var(--border);
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            color: var(--ink);
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: background 0.12s;
            text-decoration: none;
        }
        .dropdown-item:hover { background: var(--bg); }
        .dropdown-item.danger { color: #c0392b; }
        .dropdown-item.danger:hover { background: #fdf2f2; }
        .dropdown-divider { height: 1px; background: var(--border); }

        /* LAYOUT */
        .layout {
            position: relative;
            z-index: 1;
            display: flex;
            max-width: 1100px;
            margin: 88px auto 40px;
            gap: 24px;
            padding: 0 24px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 200px;
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            box-shadow: 0 2px 8px rgba(26,26,24,0.05);
        }

        .sidebar h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-faint);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        /* MAIN */
        .main { flex: 1; }

        .medicine-heading {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .medicine-heading span {
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 300;
            color: var(--ink-muted);
            margin-left: 10px;
        }

        /* POST CARD */
        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(26,26,24,0.05);
            transition: transform 0.18s, box-shadow 0.18s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26,26,24,0.09);
        }

        .post-card-header { margin-bottom: 14px; }

        .post-card-label-row {
            font-size: 11px;
            color: var(--ink-faint);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-yes { background: #dcfce7; color: #166534; }
        .badge-no  { background: #fee2e2; color: #991b1b; }

        .post-card ul {
            padding-left: 18px;
            list-style: disc;
        }
        .post-card ul li {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.85;
            color: var(--ink-muted);
        }

        .empty-state {
            color: var(--ink-faint);
            font-size: 15px;
            margin-top: 60px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/home" class="nav-logo">
            <span class="logo-med">Med</span>
            <span class="logo-ex">Ex</span>
            <div class="logo-dot"></div>
        </a>

        <div class="nav-search">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" placeholder="Search experiences…" id="searchInput">
        </div>

        <div class="nav-spacer"></div>

        <a href="/create-post" class="btn-new-post">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New post
        </a>

        <div class="nav-profile" id="profileMenu">
            <button class="profile-avatar" id="profileBtn">U</button>
            <div class="dropdown" id="dropdown">
                <div class="dropdown-email">user@example.com</div>
                <a href="#" class="dropdown-item">My profile</a>
                <div class="dropdown-divider"></div>
                <a href="/" class="dropdown-item danger">Log out</a>
            </div>
        </div>
    </nav>

    <!-- LAYOUT -->
    <div class="layout">

        <aside class="sidebar">
            <h3>Filter</h3>
        </aside>

        <main class="main">
            <div class="medicine-heading" id="medicineHeading">
                Loading...<span>— shared experiences</span>
            </div>
            <div id="postList"></div>
        </main>

    </div>

    <script>
        // Navbar dropdown
        const profileBtn  = document.getElementById("profileBtn");
        const dropdown    = document.getElementById("dropdown");
        const profileMenu = document.getElementById("profileMenu");

        profileBtn.addEventListener("click", () => dropdown.classList.toggle("open"));
        document.addEventListener("mousedown", (e) => {
            if (!profileMenu.contains(e.target)) dropdown.classList.remove("open");
        });

        // Feed logic
        const params   = new URLSearchParams(window.location.search);
        const medicine = params.get('medicine') || '';

        document.getElementById('medicineHeading').innerHTML =
            `${medicine}<span>— shared experiences</span>`;

        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && this.value.trim()) {
                window.location.href = '/feed?medicine=' + encodeURIComponent(this.value.trim());
            }
        });

        function summarize(post) {
            const bullets = [];
            bullets.push(`Biological sex: ${formatValue(post.gender)}`);
            bullets.push(`Dosage: ${post.dosage_amount} ${post.dosage_unit}, ${post.freq_count} time(s) per ${post.freq_per}`);
            bullets.push(`Duration: ${post.duration_value} ${post.duration_unit}`);
            bullets.push(`Achieved intended treatment effect: ${post.expected_effect}`);

            if (post.gender === 'female') {
                if (post.having_period) bullets.push('Was on menstrual period during medication');
                if (post.was_pregnant)  bullets.push('Was pregnant during medication');
            }

            post.description
                .split(/(?<=[.!?])\s+/)
                .map(s => s.trim())
                .filter(s => s.length > 4)
                .forEach(s => bullets.push(s));

            if (post.long_term_meds)   bullets.push(`Long-term medications: ${post.long_term_meds}`);
            if (post.health_conditions) bullets.push(`Health conditions: ${post.health_conditions}`);
            if (post.additional_notes) bullets.push(`Additional notes: ${post.additional_notes}`);

            return bullets;
        }

        function formatValue(val) {
            if (!val) return '—';
            return val.charAt(0).toUpperCase() + val.slice(1).replace(/_/g, ' ');
        }

        function renderPost(post) {
            const card = document.createElement('div');
            card.className = 'post-card';

            const hasUnlisted = post.unlisted_side_effects === 'yes';
            const bullets = summarize(post);

            card.innerHTML = `
                <div class="post-card-header">
                    <div class="post-card-label-row">Unlisted side effects on medication label or patient information leaflet</div>
                    <div>
                        <span class="badge ${hasUnlisted ? 'badge-yes' : 'badge-no'}">${hasUnlisted ? 'Yes' : 'No'}</span>
                    </div>
                </div>
                <ul>${bullets.map(b => `<li>${b}</li>`).join('')}</ul>
            `;

            document.getElementById('postList').appendChild(card);
        }

        async function loadPosts() {
            const res   = await fetch('/api/posts?medicine=' + encodeURIComponent(medicine));
            const posts = await res.json();

            if (posts.length === 0) {
                document.getElementById('postList').innerHTML =
                    '<p class="empty-state">No posts yet for this medication.</p>';
                return;
            }
            posts.forEach(renderPost);
        }

        loadPosts();
    </script>

</body>
</html>
