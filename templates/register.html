<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedEx — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --ink: #1a1a18;
    --ink-muted: #7a7a72;
    --ink-faint: #b8b8b0;
    --accent: #2a6b52;
    --accent-hover: #205540;
    --border: #e4e3de;
    --shadow: 0 2px 8px rgba(26,26,24,0.06), 0 12px 32px rgba(26,26,24,0.07);
    --radius: 14px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #c8c7c0 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }

  .register-card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 44px 40px;
    width: 400px;
    box-shadow: var(--shadow);
    animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 1px;
    margin-bottom: 36px;
  }
  .logo-med { font-family: 'Lora', serif; font-weight: 600; font-size: 22px; color: var(--ink); letter-spacing: -0.01em; }
  .logo-ex  { font-family: 'Lora', serif; font-weight: 500; font-size: 22px; color: var(--accent); letter-spacing: -0.01em; }
  .logo-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin-left: 3px; margin-bottom: 3px; flex-shrink: 0; }

  .register-title {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .register-sub {
    font-size: 14px;
    font-weight: 300;
    color: var(--ink-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 7px;
  }
  .input-group input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 400;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  .input-group input::placeholder { color: var(--ink-faint); }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(42,107,82,0.1);
  }
  .input-group input.error-field {
    border-color: #c0392b;
    box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
  }

  /* Password strength bar */
  .strength-bar {
    margin-top: 8px;
    height: 3px;
    border-radius: 99px;
    background: var(--border);
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .strength-label {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 5px;
    min-height: 14px;
    transition: color 0.2s;
  }

  .btn-register {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 9px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
    box-shadow: 0 2px 10px rgba(42,107,82,0.22);
  }
  .btn-register:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(42,107,82,0.28);
  }
  .btn-register:active { transform: translateY(0); }

  .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
  .divider span { flex: 1; height: 1px; background: var(--border); }
  .divider p { color: var(--ink-faint); font-size: 12px; }

  .login-link { text-align: center; font-size: 14px; color: var(--ink-muted); }
  .login-link a { color: var(--accent); text-decoration: none; font-weight: 600; transition: opacity 0.15s; }
  .login-link a:hover { opacity: 0.65; }

  #message {
    margin-top: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--ink-muted);
    min-height: 18px;
    transition: color 0.2s;
  }
  #message.error   { color: #c0392b; }
  #message.success { color: var(--accent); }
</style>
</head>

<body>
<div class="register-card">

  <div class="logo">
    <span class="logo-med">Med</span><span class="logo-ex">Ex</span>
    <div class="logo-dot"></div>
  </div>

  <h1 class="register-title">Create an account</h1>
  <p class="register-sub">Get started with MedEx today.</p>

  <form id="registerForm">
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="input-group">
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-register">Create account</button>
  </form>

  <div class="divider"><span></span><p>or</p><span></span></div>

  <p class="login-link">Already have an account? <a href="/">Sign in</a></p>

  <p id="message"></p>
</div>

<script>
  // Password strength indicator
  const pwInput = document.getElementById("password");
  const fill    = document.getElementById("strengthFill");
  const label   = document.getElementById("strengthLabel");

  pwInput.addEventListener("input", () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 8)            score++;
    if (/[A-Z]/.test(v))          score++;
    if (/[0-9]/.test(v))          score++;
    if (/[^A-Za-z0-9]/.test(v))   score++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: '' },
      { pct: '25%',  color: '#e74c3c',     text: 'Weak' },
      { pct: '55%',  color: '#e67e22',     text: 'Fair' },
      { pct: '80%',  color: '#f1c40f',     text: 'Good' },
      { pct: '100%', color: '#2a6b52',     text: 'Strong' },
    ];
    const s = v.length === 0 ? levels[0] : levels[score] || levels[1];
    fill.style.width      = s.pct;
    fill.style.background = s.color;
    label.style.color     = s.color;
    label.innerText       = s.text;
  });

  // Form submit
  document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const msg             = document.getElementById("message");
    const email           = document.getElementById("email").value;
    const password        = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const confirmInput    = document.getElementById("confirmPassword");

    if (password !== confirmPassword) {
      confirmInput.classList.add("error-field");
      msg.className  = 'error';
      msg.innerText  = 'Passwords do not match.';
      return;
    }
    confirmInput.classList.remove("error-field");

    msg.className = '';
    msg.innerText = 'Creating your account…';

    try {
      const response = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      msg.className = response.ok ? 'success' : 'error';
      msg.innerText = data.message;
      if (response.ok) setTimeout(() => window.location.href = "/", 1500);
    } catch {
      msg.className = 'error';
      msg.innerText = 'Network error. Please try again.';
    }
  });
</script>
</body>
</html>
