<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f7fb;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* login card */

.login-card{
    background:white;
    padding:40px;
    width:360px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* title */

.login-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:25px;
    text-align:center;
}

/* inputs */

.input-group{
    margin-bottom:18px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

/* focus effect */

input:focus{
    outline:none;
    border-color:#4f46e5;
}

/* button */

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#4338ca;
}

/* message */

#message{
    margin-top:15px;
    text-align:center;
    color:#666;
}

</style>

</head>

<body>

<div class="login-card">

<div class="login-title">
MedExperience Login
</div>

<form id="loginForm">

<div class="input-group">
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">
Sign in
</button>

</form>

<p id="message"></p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

    const data = await response.json();

    document.getElementById("message").innerText = data.message;

});

</script>

</body>
</html>
